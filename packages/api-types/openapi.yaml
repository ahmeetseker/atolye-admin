  # ───────────────────────── Auth refresh (Wave-16 / A77) ─────────────────────────
  /auth/refresh:
    post:
      tags: [auth]
      summary: Exchange a near-expiry token for a fresh one
      operationId: refreshAuth
      description: |
        Refresh policy (apps/api/src/routes/auth.ts — Wave-16 / A77):
        - eligible only when `exp - now <= 5min`
        - absolute cap: `now - iat <= 24h` (no infinite refresh chains)
        - rejected if token's `jti` is in the revocation set
          (`details.reason = "revoked"`, Wave-19 / A91)
        The fresh token carries a new `jti` so a logout of the old one does
        not invalidate the refresh.
      responses:
        '200':
          description: OK — issues a new JWT (new jti, refreshed iat/exp).
          headers:
            X-RateLimit-Limit: { $ref: '#/components/headers/XRateLimitLimit' }
            X-RateLimit-Remaining: { $ref: '#/components/headers/XRateLimitRemaining' }
            X-RateLimit-Reset: { $ref: '#/components/headers/XRateLimitReset' }
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data: { $ref: '#/components/schemas/AuthRefreshResponse' }
        '401':
          description: |
            Refresh denied. `error.details.reason` is one of:
            - `expired` — token's exp is in the past
            - `bad-signature` — signature did not verify
            - `revoked` — token's jti is in the revocation set
            - `too-early` — token still has >5min of life
            - `iat-window-elapsed` — token issued >24h ago
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '429':
          description: Rate limit exceeded — RFC 6585 §4 token bucket.
          headers:
            X-RateLimit-Limit: { $ref: '#/components/headers/XRateLimitLimit' }
            X-RateLimit-Remaining: { $ref: '#/components/headers/XRateLimitRemaining' }
            X-RateLimit-Reset: { $ref: '#/components/headers/XRateLimitReset' }
            Retry-After: { $ref: '#/components/headers/RetryAfter' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
