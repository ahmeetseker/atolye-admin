<!-- Font preconnect — LandX uses system serif + mono fallback; if app fonts
     are loaded by host, Storybook will pick them up via @import in theme.css.
     This file is intentionally minimal but exists so future devs can hook
     fonts/perf-hints without restructuring the preview. -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
