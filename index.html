<!doctype html>
<html lang="tr">
  <head>
    <!--
      Inline theme bootstrap — must run BEFORE any paint to prevent dark/light
      FOUC. Mirror of `themeInitScript` from `@landx/ui/theme` (init-script.ts).
      If the upstream script changes, update this block to match.
    -->
    <script>(function(){try{var k='arsam.theme.v1';var s=localStorage.getItem(k);var v=s==='light'||s==='dark'||s==='system'?s:'system';var d=v==='dark'||(v==='system'&&window.matchMedia('(prefers-color-scheme: dark)').matches);document.documentElement.classList.toggle('dark',d);document.documentElement.dataset.theme=v;}catch(e){}})();</script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#FBF8F2" />
    <meta name="color-scheme" content="light dark" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <title>Sahibinden v3</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
